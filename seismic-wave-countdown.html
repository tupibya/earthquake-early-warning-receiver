<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NERV風 リアルタイム地震波カウントダウン</title>

  <style>
    @import url('https://googleapis.com');

:root {
    --bg-color: #050505;
    --nerv-orange: #ff6600;
    --nerv-red: #ff0033;
    --nerv-yellow: #ffcc00;
    --dark-gray: #1a1a1a;
}

/* 画面全体のスクロールを防ぎ、中央に収める */
body {
    background-color: var(--bg-color);
    color: var(--nerv-orange);
    font-family: 'Noto Sans JP', sans-serif;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    overflow-x: hidden; /* 横スクロールを完全に禁止 */
}

/* コンテナが画面幅を超えないように最大幅を100%に絞る */
.nerv-container {
    width: 100%;
    max-width: 550px; /* 少しコンパクトに調整 */
    background: linear-gradient(135deg, #0d0d0d 0%, #050505 100%);
    border: 3px solid var(--nerv-orange);
    padding: 15px;
    box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
    position: relative;
    box-sizing: border-box;
}

.nerv-container::before {
    content: "NERV DISASTER PREVENTION SYSTEM / LIVE_MODE";
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    opacity: 0.5;
    letter-spacing: 1px;
}

/* 接続ステータス */
.api-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    margin-bottom: 8px;
    color: #888;
}
.api-status.connected span { color: #00ff66; }
.api-status.disconnected span { color: var(--nerv-red); }

/* ヘッダー警告メッセージ（画面幅に応じて文字サイズが可変） */
.header-alert {
    background-color: var(--dark-gray);
    color: var(--nerv-orange);
    border: 2px solid var(--nerv-orange);
    font-size: clamp(16px, 4.5vw, 24px); /* 最小16px、画面幅に応じて最大24px */
    font-weight: 900;
    text-align: center;
    padding: 8px;
    letter-spacing: 2px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

.header-alert.active {
    background-color: var(--nerv-red);
    color: #fff;
    border: 1px solid #fff;
    animation: blink 1s infinite alternate;
}

@keyframes blink {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}

/* 地震情報エリア */
.info-box {
    border-bottom: 2px dashed var(--nerv-orange);
    padding-bottom: 10px;
    margin-bottom: 15px;
}

.info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: clamp(13px, 3.5vw, 16px);
}

.info-label { color: #888; }
.info-value { font-weight: bold; color: #fff; }
.intensity-font { font-size: clamp(16px, 4.5vw, 22px); }

/* タイマーセクション */
.timer-section {
    background-color: var(--dark-gray);
    border: 1px solid var(--nerv-orange);
    padding: 10px;
    margin-bottom: 12px;
    box-sizing: border-box;
}
.timer-section.p-wave { border-color: var(--nerv-yellow); }
.timer-section.s-wave { border-color: var(--nerv-red); }

.timer-title {
    font-size: clamp(9px, 2.5vw, 12px); /* 長い英語テキストがはみ出さないように極小〜調整 */
    font-weight: bold;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
}
.p-wave .timer-title { color: var(--nerv-yellow); }
.s-wave .timer-title { color: var(--nerv-red); }

/* カウントダウン数字（特にはみ出しやすいため、vwで厳重にスマホ最適化） */
.timer-digits {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(36px, 11vw, 54px); 
    text-align: right;
    line-height: 1;
    font-weight: bold;
}
.timer-digits span {
    font-size: clamp(16px, 4vw, 24px);
    margin-left: 5px;
}

/* 進行状況バー */
.progress-bar-container {
    width: 100%;
    height: 6px;
    background-color: #333;
    margin-top: 8px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    width: 0%;
    transition: width 0.1s linear;
}
.p-wave .progress-bar { background-color: var(--nerv-yellow); }
.s-wave .progress-bar { background-color: var(--nerv-red); }

/* 共通カラークラス */
.text-red { color: var(--nerv-red) !important; }
.text-yellow { color: var(--nerv-yellow) !important; }

/* テスト用ボタン */
.test-panel {
    margin-top: 15px;
    border: 1px dashed #333;
    padding: 8px;
    text-align: center;
}
.btn-test {
    background: transparent;
    color: #777;
    border: 1px solid #333;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 11px;
    width: 100%; /* ボタン自体もはみ出し防止 */
    box-sizing: border-box;
}
.btn-test:hover { color: var(--nerv-orange); border-color: var(--nerv-orange); }

  </style>

  
</head>
<body>
  <!-- 外部CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">

    <div class="nerv-container">
        <!-- API接続ステータス -->
        <div class="api-status disconnected" id="ws-status">WS-API: <span>DISCONNECTED</span></div>

        <!-- 警告ヘッダー -->
        <div class="header-alert" id="alert-title">STANDBY: 常時監視中</div>

        <!-- 地震情報エリア -->
        <div class="info-box">
            <div class="info-row">
                <span class="info-label">震源地</span>
                <span class="info-value" id="epicenter">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">推定規模</span>
                <span class="info-value" id="magnitude">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">最大予測震度</span>
                <span class="info-value text-red intensity-font" id="max-intensity">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">報数情報</span>
                <span class="info-value" id="report-num">--</span>
            </div>
        </div>

        <!-- P波（初期微動）タイマー -->
        <div class="timer-section p-wave">
            <div class="timer-title">
                <span>PRELIMINARY TREMOR (P-WAVE) / 初期微動到達予想</span>
                <span id="p-status">待機中</span>
            </div>
            <div class="timer-digits text-yellow" id="p-timer">0.00<span>SEC</span></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="p-progress"></div>
            </div>
        </div>

        <!-- S波（主要動）タイマー -->
        <div class="timer-section s-wave">
            <div class="timer-title">
                <span>PRINCIPAL MOTION (S-WAVE) / 主要動到達予想</span>
                <span id="s-status">待機中</span>
            </div>
            <div class="timer-digits text-red" id="s-timer">0.00<span>SEC</span></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="s-progress"></div>
            </div>
        </div>

        <!-- 手動テスト機能（動作検証用） -->
        <div class="test-panel">
            <button class="btn-test" onclick="simulateEEW()">⚙️ ダミーデータで挙動テストを実施</button>
        </div>
    </div>

    <!-- 外部JavaScriptファイルの読み込み -->
    <script src="app.js"></script>

  <script>
    const WS_URL = "wss://ws-api.wolfx.jp/jma_eew";
let socket = null;
let countdownInterval = null;

// ==========================================
// 【現在地の初期設定】
// 位置情報が許可されるまでの初期値（デフォルト：東京駅）
// ==========================================
let myLatitude = 35.681236;
let myLongitude = 139.767125;
let isLocationAcquired = false; // 位置情報が取れたかどうかのフラグ

// 地震波の平均速度 (km/s)
const P_WAVE_SPEED = 6.0; 
const S_WAVE_SPEED = 3.5; 

// Web Audio APIによる音声警告
function playBeep(frequency, duration) {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = frequency;
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    } catch (e) {
        console.log("Audio Context blocked.");
    }
}

// 🌐 ブラウザのGPS/位置情報を取得する関数
function requestCurrentLocation() {
    const statusDiv = document.getElementById('ws-status');

    if (!navigator.geolocation) {
        console.log("このブラウザは位置情報に対応していません。デフォルト位置を使用します。");
        return;
    }

    // オプション設定（高精度、タイムアウト10秒）
    const options = {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
    };

    navigator.geolocation.getCurrentPosition(
        (position) => {
            // 取得成功時
            myLatitude = position.coords.latitude;
            myLongitude = position.coords.longitude;
            isLocationAcquired = true;
            console.log(`現在地を取得しました: 緯度 ${myLatitude.toFixed(4)}, 経度 ${myLongitude.toFixed(4)}`);
            
            // 接続ステータス欄にGPS取得完了を表示
            const originalText = statusDiv.querySelector('span').innerText;
            statusDiv.querySelector('span').innerHTML = `${originalText} <span style="color: #00ff66; margin-left:10px;">[📍GPS: OK]</span>`;
        },
        (error) => {
            // 拒否された、またはエラー時
            console.warn(`位置情報の取得に失敗しました (${error.message})。デフォルト位置（東京）で動作します。`);
            const originalText = statusDiv.querySelector('span').innerText;
            statusDiv.querySelector('span').innerHTML = `${originalText} <span style="color: #ffcc00; margin-left:10px;">[📍GPS: DEFAULT]</span>`;
        },
        options
    );
}

// 2地点の緯度経度から地表上の水平距離(km)を計算 (ヒュベニの公式)
function calculateHorizontalDistance(lat1, lng1, lat2, lng2) {
    const radLat1 = lat1 * Math.PI / 180;
    const radLng1 = lng1 * Math.PI / 180;
    const radLat2 = lat2 * Math.PI / 180;
    const radLng2 = lng2 * Math.PI / 180;

    const radLatDiff = radLat1 - radLat2;
    const radLngDiff = radLng1 - radLng2;
    const avgLat = (radLat1 + radLat2) / 2;
    
    const Rx = 6378137.0; 
    const E2 = 0.006694379990197589; 
    
    const sinLat = Math.sin(avgLat);
    const W = Math.sqrt(1.0 - E2 * sinLat * sinLat);
    const M = Rx * (1.0 - E2) / (W * W * W); 
    const N = Rx / W;                         

    const t1 = M * radLatDiff;
    const t2 = N * Math.cos(avgLat) * radLngDiff;
    
    return Math.sqrt(t1 * t1 + t2 * t2) / 1000;
}

// WebSocket接続開始
function connectWS() {
    socket = new WebSocket(WS_URL);

    socket.onopen = () => {
        const statusDiv = document.getElementById('ws-status');
        statusDiv.className = "api-status connected";
        statusDiv.querySelector('span').innerText = "CONNECTED (LIVE)";
        
        // 接続完了したタイミングで現在地をリクエスト
        requestCurrentLocation();
    };

    socket.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.type === "ping" || !data.Title) return;

            // 緊急地震速報をキャッチ
            if (data.Title.includes("緊急地震速報")) {
                processEEW(data);
            }
        } catch (e) {
            console.error("Data parse error:", e);
        }
    };

    socket.onclose = () => {
        const statusDiv = document.getElementById('ws-status');
        statusDiv.className = "api-status disconnected";
        statusDiv.querySelector('span').innerText = "DISCONNECTED (RECONNECTING...)";
        setTimeout(connectWS, 5000); 
    };
}

// EEW受信時のメイン処理
function processEEW(eewData) {
    if (countdownInterval) clearInterval(countdownInterval);

    // 震源パラメータの取得
    const eqLat = parseFloat(eewData.Latitude);
    const eqLng = parseFloat(eewData.Longitude);
    const eqDepth = parseFloat(eewData.Depth || 10); 

    // 画面に基本テキスト情報を反映
    document.getElementById('epicenter').innerText = `${eewData.Hypocenter || "不明"} (深さ: ${eqDepth}km)`;
    document.getElementById('magnitude').innerText = eewData.Magunitude ? `M ${eewData.Magunitude}` : "不明";
    document.getElementById('max-intensity').innerText = eewData.MaxIntensity || "不明";
    document.getElementById('report-num').innerText = `第 ${eewData.ReportNum || "0"} 報 ${eewData.isFinal ? '(最終報)' : ''}`;

    const header = document.getElementById('alert-title');
    header.innerText = `EEW: ${eewData.Title}`;
    header.classList.add('active');

    // 猶予時間のデフォルト設定（フォールバック用）
    let pTotalDelay = 15;
    let sTotalDelay = 30;

    if (!isNaN(eqLat) && !isNaN(eqLng)) {
        // ★ 取得した「現在地（myLatitude/myLongitude）」を使って3次元距離をミリ秒計算！
        const horizontalDist = calculateHorizontalDistance(myLatitude, myLongitude, eqLat, eqLng);
        const hypocenterDist = Math.sqrt(Math.pow(horizontalDist, 2) + Math.pow(eqDepth, 2));

        pTotalDelay = hypocenterDist / P_WAVE_SPEED;
        sTotalDelay = hypocenterDist / S_WAVE_SPEED;
    }

    // 時刻同期
    let originTime = Date.now();
    if (eewData.OriginTime) {
        const formattedTimeStr = eewData.OriginTime.replace(/-/g, '/');
        const parsedTime = Date.parse(formattedTimeStr);
        if (!isNaN(parsedTime)) {
            originTime = parsedTime;
        }
    }

    playBeep(880, 0.2);
    setTimeout(() => playBeep(880, 0.2), 300);

    // カウントダウンタイマー
    countdownInterval = setInterval(() => {
        const now = Date.now();
        const elapsedSeconds = (now - originTime) / 1000;

        let pRemaining = pTotalDelay - elapsedSeconds;
        let sRemaining = sTotalDelay - elapsedSeconds;
        
        if (isNaN(pRemaining) || pRemaining < 0) pRemaining = 0;
        if (isNaN(sRemaining) || sRemaining < 0) sRemaining = 0;

        // --- P波（初期微動）の描画 ---
        if (pRemaining > 0) {
            document.getElementById('p-status').innerText = "接近中";
            document.getElementById('p-timer').innerHTML = `${pRemaining.toFixed(2)}<span>SEC</span>`;
            document.getElementById('p-progress').style.width = `${(pRemaining / pTotalDelay) * 100}%`;
            if (Math.floor(pRemaining * 10) % 10 === 0 && pRemaining <= 5) playBeep(1000, 0.04);
        } else {
            document.getElementById('p-status').innerText = "到達";
            document.getElementById('p-timer').innerHTML = `0.00<span>ARRIVED</span>`;
            document.getElementById('p-progress').style.width = `0%`;
        }

        // --- S波（主要動）の描画 ---
        if (sRemaining > 0) {
            document.getElementById('s-status').innerText = "接近中";
            document.getElementById('s-timer').innerHTML = `${sRemaining.toFixed(2)}<span>SEC</span>`;
            document.getElementById('s-progress').style.width = `${(sRemaining / sTotalDelay) * 100}%`;
            if (pRemaining === 0 && Math.floor(sRemaining * 10) % 10 === 0 && sRemaining <= 5) playBeep(660, 0.06);
        } else {
            document.getElementById('s-status').innerText = "到達";
            document.getElementById('s-timer').innerHTML = `0.00<span>ARRIVED</span>`;
            document.getElementById('s-progress').style.width = `0%`;
            
            clearInterval(countdownInterval);
            playBeep(440, 1.0); 
            
            setTimeout(() => {
                header.innerText = "STANDBY: 常時監視中";
                header.classList.remove('active');
            }, 10000);
        }
    }, 50);
}

// テスト用ダミーデータ
function simulateEEW() {
    const now = new Date();
    const timeStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    
    const mockData = {
        "Title": "緊急地震速報（予報）",
        "Hypocenter": "三重県南東沖 (TEST)",
        "Magunitude": "6.5",
        "MaxIntensity": "3",
        "ReportNum": "4",
        "isFinal": false,
        "Latitude": "34.2",  
        "Longitude": "136.7", 
        "Depth": "10",       
        "OriginTime": timeStr
    };
    processEEW(mockData);
}

window.onload = connectWS;

  </script>
</body>
</html>
